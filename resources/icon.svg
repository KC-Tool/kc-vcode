<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc1ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- code bracket left -->
  <text x="32" y="58" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700" fill="#4fc1ff" opacity="0.9">&lt;</text>

  <!-- kc -->
  <text x="64" y="52" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="30" font-weight="700" fill="#ffffff">kc</text>

  <!-- code bracket right -->
  <text x="90" y="58" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700" fill="#4fc1ff" opacity="0.9">&gt;</text>

  <!-- vcode -->
  <text x="64" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#8899aa" letter-spacing="2">VCODE</text>

  <!-- bottom accent line -->
  <rect x="36" y="94" width="56" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
</svg>
